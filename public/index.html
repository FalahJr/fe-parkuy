<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/parkuy.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Parkuy - Platform digitalisasi sistem parkir dan penyedia lapangan kerja untuk tukang parkir"
    />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link
      rel="preload"
      as="image"
      href="%PUBLIC_URL%/assets/img/Content/Image.home.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Parkuy</title>
    <style>
      /* Critical CSS - Inline for immediate FCP/LCP */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: linear-gradient(180deg, #f6f9fc 0%, #eef4f9 100%); color: #12304a; }
      nav { position: fixed; top: 0; left: 16px; width: calc(100% - 32px); height: 84px; z-index: 10; display: flex; align-items: center; background: rgba(8, 23, 38, 0.82); border-radius: 0 0 28px 28px; }
      .header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 20px 0 14px; }
      .home-hero { position: relative; width: 100%; min-height: 100vh; display: grid; align-items: center; padding: 0; }
      .home-hero__media { position: absolute; inset: 0; overflow: hidden; }
      .home-hero__image { width: 100%; height: 100%; object-fit: cover; display: block; }
      .home-hero__content { position: relative; z-index: 1; display: grid; gap: 28px; padding: clamp(32px, 6vw, 80px); align-content: center; color: #fff; }
      .home-hero__copy h1 { margin: 0; font-weight: 700; font-size: clamp(3.4rem, 9vw, 6rem); line-height: 1; }
      .home-button { border: 0; border-radius: 999px; display: inline-flex; gap: 10px; font-weight: 600; padding: 14px 22px; cursor: pointer; }
      .home-button--primary { background: linear-gradient(135deg, #f6a74d 0%, #f68c05 100%); color: #10263a; }
      .home-services, .home-benefit, .home-download { content-visibility: auto; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
